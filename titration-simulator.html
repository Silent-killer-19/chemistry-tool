
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Research Lab Titration Simulator 2.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:rgba(255,255,255,0.07);
backdrop-filter:blur(20px);
padding:25px;
border-radius:25px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h2{text-align:center;margin-bottom:20px;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input,select{
width:100%;
padding:8px;
border-radius:10px;
border:none;
margin:6px 0;
}

.slider{width:100%;}

.result{
margin-top:15px;
padding:15px;
border-radius:15px;
background:rgba(0,0,0,0.4);
}

canvas{
background:white;
border-radius:15px;
margin-top:20px;
}

@media(max-width:800px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="container">

<h2>🧪 Ultimate Research Lab Titration Simulator 2.0</h2>

<div class="grid">

<div>

<label>Mode</label>
<select id="mode">
<option value="ph">pH Titration</option>
<option value="cond">Conductometric</option>
</select>

<label>Acid Type</label>
<select id="acidType">
<option value="mono">Monoprotic</option>
<option value="di">Diprotic (H₂A)</option>
</select>

<label>Acid Concentration (M)</label>
<input type="number" id="Ca" value="0.1">

<label>Acid Volume (mL)</label>
<input type="number" id="Va" value="50">

<label>Base Concentration (M)</label>
<input type="number" id="Cb" value="0.1">

<label>Ka₁</label>
<input type="number" id="Ka1" value="1e-5">

<label>Ka₂ (if diprotic)</label>
<input type="number" id="Ka2" value="1e-9">

<label>Temperature (°C)</label>
<input type="number" id="temp" value="25">

<label>Added Base Volume (mL)</label>
<input type="range" min="0" max="150" step="0.5"
id="Vb" class="slider" oninput="update()">
<span id="displayV">0 mL</span>

</div>

<div>
<div class="result" id="result"></div>
</div>

</div>

<canvas id="graph" width="1000" height="450"></canvas>

</div>

<script>

function KwTemp(T){
return 1e-14*Math.exp(0.05*(T-25));
}

function safeLog(x){
if(x<=0) return 0;
return Math.log10(x);
}

function update(){

let mode=document.getElementById("mode").value;
let acidType=document.getElementById("acidType").value;
let Ca=parseFloat(document.getElementById("Ca").value);
let Va=parseFloat(document.getElementById("Va").value)/1000;
let Cb=parseFloat(document.getElementById("Cb").value);
let Ka1=parseFloat(document.getElementById("Ka1").value);
let Ka2=parseFloat(document.getElementById("Ka2").value);
let T=parseFloat(document.getElementById("temp").value);
let Vb=parseFloat(document.getElementById("Vb").value)/1000;

document.getElementById("displayV").innerText=(Vb*1000).toFixed(1)+" mL";

let Kw=KwTemp(T);
let molesA=Ca*Va;
let molesB=Cb*Vb;
let totalVol=Va+Vb;

let pH=7;
let conductivity=0;
let Veq1=molesA/Cb;
let Veq2=(acidType=="di")?2*molesA/Cb:Veq1;

if(acidType=="mono"){

if(Vb<Veq1){
let HA=molesA-molesB;
let A=molesB;
pH=-safeLog(Ka1)+safeLog(A/HA);
}
else{
let excess=(molesB-molesA)/totalVol;
pH=14+safeLog(excess);
}

}

if(acidType=="di"){

if(Vb<Veq1){
let HA=molesA-molesB;
let A=molesB;
pH=-safeLog(Ka1)+safeLog(A/HA);
}
else if(Vb<Veq2){
let HA2=2*molesA-molesB;
let A2=molesB-molesA;
pH=-safeLog(Ka2)+safeLog(A2/HA2);
}
else{
let excess=(molesB-2*molesA)/totalVol;
pH=14+safeLog(excess);
}

}

pH=Math.max(0,Math.min(14,pH));

conductivity=Math.abs(molesB-molesA)/totalVol*100;

document.getElementById("result").innerHTML=
"<b>pH:</b> "+pH.toFixed(3)+
"<br><b>Equivalence 1:</b> "+(Veq1*1000).toFixed(2)+" mL"+
(acidType=="di"?"<br><b>Equivalence 2:</b> "+(Veq2*1000).toFixed(2)+" mL":"")+
"<br><b>Conductivity (relative):</b> "+conductivity.toFixed(3);

drawGraph(mode,acidType,Ca,Va,Cb,Ka1,Ka2,T);
}

function drawGraph(mode,acidType,Ca,Va,Cb,Ka1,Ka2,T){

let canvas=document.getElementById("graph");
let ctx=canvas.getContext("2d");
ctx.clearRect(0,0,1000,450);

ctx.beginPath();
ctx.strokeStyle="blue";
ctx.lineWidth=2;

let molesA=Ca*Va;
let Veq1=molesA/Cb;
let Veq2=(acidType=="di")?2*molesA/Cb:Veq1;

for(let V=0;V<=Veq2*1.5;V+=Veq2/80){

let totalVol=Va+V;
let pH=7;

if(acidType=="mono"){
if(V<Veq1){
let HA=molesA-Cb*V;
let A=Cb*V;
pH=-Math.log10(Ka1)+Math.log10(A/HA);
}
else{
let excess=(Cb*V-molesA)/totalVol;
pH=14+Math.log10(excess);
}
}

if(acidType=="di"){
if(V<Veq1){
let HA=molesA-Cb*V;
let A=Cb*V;
pH=-Math.log10(Ka1)+Math.log10(A/HA);
}
else if(V<Veq2){
let HA2=2*molesA-Cb*V;
let A2=Cb*V-molesA;
pH=-Math.log10(Ka2)+Math.log10(A2/HA2);
}
else{
let excess=(Cb*V-2*molesA)/totalVol;
pH=14+Math.log10(excess);
}
}

pH=Math.max(0,Math.min(14,pH));

let x=(V/(Veq2*1.5))*1000;
let y=450-(pH/14)*450;

if(V==0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
}

ctx.stroke();
}

update();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Salt Hydrolysis Calculator</title>
</head>
<body>
<h2>Salt Hydrolysis (Weak Acid Salt)</h2>

<input type="number" id="Ka" placeholder="Ka of weak acid">
<input type="number" id="C" placeholder="Salt concentration">

<button onclick="hydro()">Calculate</button>

<div id="res"></div>

<script>
function hydro(){
let Ka=parseFloat(document.getElementById("Ka").value);
let C=parseFloat(document.getElementById("C").value);
let Kw=1e-14;

let H=Math.sqrt((Kw/Ka)*C);
let pH=-Math.log10(H);

document.getElementById("res").innerHTML=
"pH = "+pH.toFixed(4);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Advanced pH Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    padding:25px;
    border-radius:20px;
    width:95%;
    max-width:450px;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
    color:white;
}

h1{
    text-align:center;
    font-size:22px;
}

select,input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:none;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0072ff;
    color:white;
}

.result{
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
    opacity:0;
    transform:translateY(10px);
    transition:all 0.5s ease;
}

.result.show{
    opacity:1;
    transform:translateY(0);
}

.steps{
    margin-top:15px;
    font-size:13px;
    background:rgba(0,0,0,0.3);
    padding:10px;
    border-radius:10px;
}

canvas{
    margin-top:15px;
}

.back{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#00c6ff;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<h1>Advanced pH Calculator</h1>

<select id="type">
    <option value="acid">Acid</option>
    <option value="base">Base</option>
</select>

<select id="strength">
    <option value="strong">Strong</option>
    <option value="weak">Weak</option>
</select>

<input type="number" id="concentration" placeholder="Concentration (M)">
<input type="number" id="ka" placeholder="Ka or Kb (only for weak)">
<input type="number" id="temp" placeholder="Temperature (¬∞C optional)">

<button onclick="calculatePH()">Calculate</button>

<div class="result" id="result"></div>

<div class="steps" id="steps"></div>

<canvas id="phChart"></canvas>

<a href="index.html" class="back">‚¨Ö Back to Dashboard</a>

</div>

<script>

let chart;

function calculatePH(){

let type=document.getElementById("type").value;
let strength=document.getElementById("strength").value;
let C=parseFloat(document.getElementById("concentration").value);
let K=parseFloat(document.getElementById("ka").value);

if(!C){
    alert("Enter concentration!");
    return;
}

let pH, stepsText="";

if(strength==="strong"){

    if(type==="acid"){
        pH=-Math.log10(C);
        stepsText=`
        Strong Acid:
        [H‚Å∫] = C
        pH = -log[H‚Å∫]
        pH = -log(${C})
        `;
    }else{
        let pOH=-Math.log10(C);
        pH=14-pOH;
        stepsText=`
        Strong Base:
        [OH‚Åª] = C
        pOH = -log[OH‚Åª]
        pH = 14 - pOH
        `;
    }

}else{

    if(!K){
        alert("Enter Ka/Kb for weak solution!");
        return;
    }

    if(type==="acid"){
        let H=Math.sqrt(K*C);
        pH=-Math.log10(H);
        stepsText=`
        Weak Acid:
        [H‚Å∫] = ‚àö(Ka √ó C)
        [H‚Å∫] = ‚àö(${K} √ó ${C})
        pH = -log[H‚Å∫]
        `;
    }else{
        let OH=Math.sqrt(K*C);
        let pOH=-Math.log10(OH);
        pH=14-pOH;
        stepsText=`
        Weak Base:
        [OH‚Åª] = ‚àö(Kb √ó C)
        pOH = -log[OH‚Åª]
        pH = 14 - pOH
        `;
    }
}

pH=pH.toFixed(3);

let resultDiv=document.getElementById("result");
resultDiv.innerHTML="pH = "+pH;
resultDiv.classList.add("show");

document.getElementById("steps").innerHTML=stepsText;

drawGraph(pH);
}

function drawGraph(value){

let ctx=document.getElementById("phChart");

if(chart){
    chart.destroy();
}

chart=new Chart(ctx,{
    type:'bar',
    data:{
        labels:["pH Scale (0 - 14)"],
        datasets:[{
            label:"Your pH",
            data:[value],
            backgroundColor:'rgba(0,198,255,0.8)'
        }]
    },
    options:{
        scales:{
            y:{
                min:0,
                max:14
            }
        }
    }
});
}

</script>

</body>
</html>
